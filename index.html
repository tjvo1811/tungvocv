<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tung (TJ) Vo - Portfolio</title>
    <meta name="description" content="Portfolio of Tung (TJ) Vo — Applied Mathematics undergraduate at the University of St. Thomas. Research in graph theory, history & public policy, and data-driven storytelling." />
    <meta name="theme-color" content="#EBE5D2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1B221C" media="(prefers-color-scheme: dark)" />
    <meta property="og:title" content="Tung (TJ) Vo — Portfolio" />
    <meta property="og:description" content="Applied Mathematics undergraduate. Research in graph theory, history & public policy, and data-driven storytelling." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.png" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <script>
      (function () {
        var stored = null;
        try { stored = localStorage.getItem('tv-theme'); } catch (e) {}
        var dark = stored
          ? stored === 'dark'
          : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500;1,8..60,600&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --paper:      #EBE5D2;
        --paper-2:    #E1DAC4;
        --ink:        #3D4A3A;
        --ink-muted:  #7A8377;
        --rule:       #3D4A3A;
        --sage:       #6B7F60;
        --sage-soft:  #A8B49A;
        --bone:       #C8BFA3;
      }
      html.dark {
        --paper:      #1B221C;
        --paper-2:    #252C25;
        --ink:        #DDE2D5;
        --ink-muted:  #9DA89A;
        --rule:       #DDE2D5;
        --sage:       #A8B49A;
        --sage-soft:  #6B7F60;
        --bone:       #8B8470;
      }
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 72px;
      }
      body {
        background-color: var(--paper);
        color: var(--ink);
        font-family: 'Source Serif 4', Georgia, serif;
        font-feature-settings: 'kern' 1, 'liga' 1, 'onum' 1;
        /* Prevent the browser from faking bold/italic when a glyph or weight
           is missing — synthesized bold mangles Vietnamese diacritics
           (Ố, Ấ, Ử, Ọ, etc.) and makes them look mis-weighted. */
        font-synthesis: none;
        -webkit-font-synthesis: none;
      }
      html.dark body {
        background-color: var(--paper);
        color: var(--ink);
      }
      ::selection {
        background-color: var(--bone);
        color: var(--ink);
      }
      @media print {
        nav, footer, button { display: none !important; }
      }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
