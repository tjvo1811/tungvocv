  <head>

    <title>Tung (TJ) Vo - Portfolio</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,400;1,9..144,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              display: ['"Fraunces"', 'serif'],
              sans: ['"DM Sans"', 'sans-serif'],
            },
            colors: {
              forest: {
                DEFAULT: '#1a3d2b',
                light: '#2d6a4f',
                muted: '#4a7c5f',
              },
              nobel: {
                gold: '#C5A059',
              }
            }
          }
        }
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 80px;
      }
      body {
        background-color: #EDEAE2;
        color: #1a3d2b;
        /* Prevent the browser from faking bold/italic when a glyph or weight
           is missing — synthesized bold mangles Vietnamese diacritics
           (Ố, Ấ, Ử, Ọ, etc.) and makes them look mis-weighted. */
        font-synthesis: none;
        -webkit-font-synthesis: none;
      }
      html.dark body {
        background-color: #0c1a11;
        color: #e0f0e8;
      }
      @media print {
        nav, footer, button { display: none !important; }
      }
    </style>
